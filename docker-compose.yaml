services:
  db:
    image: postgres:15-alpine
    container_name: portal_db
    restart: always
    environment:
      POSTGRES_DB: portaldatabase
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5433:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d portaldatabase"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend             # Diz pro Docker ler o Dockerfile da pasta backend
    container_name: portal_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app           # Sincroniza seu código em tempo real
    depends_on:
      db:
        condition: service_healthy # Só liga depois que o banco estiver pronto e aceitando conexões
    environment:
      - DB_HOST=db
      - DB_NAME=portaldatabase
      - DB_USER=admin
      - DB_PASSWORD=adminpassword
      - DB_PORT=5432
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend            # Diz pro Docker ler o Dockerfile da pasta frontend
    container_name: portal_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app          # Sincroniza seu código do React em tempo real
      - /app/node_modules        # Protege as dependências do contêiner
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host"

  mailpit:
        image: axllent/mailpit
        container_name: mailpit
        restart: unless-stopped
        volumes:
            - ./data:/data
        ports:
            - 8025:8025
            - 1025:1025
        environment:
            MP_MAX_MESSAGES: 5000
            MP_DATABASE: /data/mailpit.db
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres_data: