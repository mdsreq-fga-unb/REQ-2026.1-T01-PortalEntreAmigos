name: Frontend CI - Testes

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**' # Somente executa para mudanças na pasta frontend
  pull_request:
    branches:
      - main
      - develop

jobs:
  run-tests:
    name: Executar Testes com Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: |
          cd frontend
          npm ci

      - name: Rodar os testes (Vitest)
        run: |
          cd frontend
          npx vitest run # Executa uma única vez sem modo watch